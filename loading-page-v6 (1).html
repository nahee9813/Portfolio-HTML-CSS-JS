<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — My Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cyan: #00c8ff;
  --blue: #1a8cff;
  --dark: #050810;
}

body {
  background: var(--dark);
  color: #fff;
  font-family: 'Share Tech Mono', monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Animated canvas background ── */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* Radial vignette */
.vig {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: radial-gradient(ellipse 70% 70% at 50% 50%,
    transparent 25%, rgba(5,8,16,0.82) 72%, var(--dark) 100%);
  pointer-events: none;
}

/* ── Main wrapper ── */
.wrap {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  animation: wrapIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes wrapIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Label ── */
.top-label {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 7px;
  color: rgba(0,200,255,0.38);
  text-transform: uppercase;
  animation: fadeDown 0.6s ease 0.3s both;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Circle spinner ── */
.circle-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SVG progress ring drawn via JS */
#progressRing {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

/* Outer decorative dashes ring */
.dash-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px dashed rgba(0,200,255,0.15);
  animation: spinSlow 18s linear infinite;
}

/* Rotating arc rings */
.arc1 {
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-top-color: rgba(0,200,255,0.6);
  border-right-color: rgba(0,200,255,0.15);
  animation: spinFast 1.6s linear infinite;
  filter: drop-shadow(0 0 6px rgba(0,200,255,0.5));
}
.arc2 {
  position: absolute;
  inset: 20px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: rgba(26,140,255,0.5);
  border-left-color: rgba(26,140,255,0.1);
  animation: spinFast 2.2s linear infinite reverse;
}
.arc3 {
  position: absolute;
  inset: 32px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-top-color: rgba(0,200,255,0.35);
  animation: spinFast 3s linear infinite;
}

/* Tick marks around the ring */
.ticks {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  animation: spinSlow 25s linear infinite reverse;
}

/* Center content */
.center-info {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.center-pct {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 36px;
  line-height: 1;
  color: var(--cyan);
  text-shadow: 0 0 18px rgba(0,200,255,0.65), 0 0 40px rgba(0,200,255,0.2);
  transition: all 0.3s;
}
.center-sub {
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}

/* Outer glow ring that pulses */
.glow-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0,200,255,0.08), inset 0 0 20px rgba(0,200,255,0.04);
  animation: ringGlow 2.5s ease-in-out infinite;
}
@keyframes ringGlow {
  0%,100% { box-shadow: 0 0 15px rgba(0,200,255,0.08), inset 0 0 15px rgba(0,200,255,0.03); }
  50%      { box-shadow: 0 0 35px rgba(0,200,255,0.18), inset 0 0 25px rgba(0,200,255,0.08); }
}

@keyframes spinFast { to { transform: rotate(360deg); } }
@keyframes spinSlow { to { transform: rotate(360deg); } }

/* ── Title ── */
.title {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(20px, 3.5vw, 30px);
  letter-spacing: 5px;
  text-align: center;
  line-height: 1.2;
  animation: fadeUp 0.7s ease 0.5s both;
}
.title span {
  color: var(--cyan);
  text-shadow: 0 0 16px rgba(0,200,255,0.5);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Progress bar ── */
.prog-section {
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: fadeUp 0.7s ease 0.65s both;
}

.prog-row {
  display: flex;
  justify-content: space-between;
}
.prog-lbl {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,200,255,0.4);
  text-transform: uppercase;
}
.prog-num {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,200,255,0.5);
}

.bar-track {
  height: 3px;
  background: rgba(0,200,255,0.07);
  border-radius: 2px;
  overflow: visible;
  position: relative;
}
.bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(0,200,255,0.55);
  transition: width 0.4s ease;
  position: relative;
}
.bar-fill::after {
  content: '';
  position: absolute;
  right: -4px; top: -4px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(0,200,255,0.4);
}

/* Status */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.s-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
  animation: dotBlink 1s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.s-txt {
  font-size: 11px;
  letter-spacing: 1.5px;
  color: rgba(0,200,255,0.45);
}

/* ── Transition overlay ── */
#overlay {
  position: fixed; inset: 0; z-index: 99;
  background: var(--dark);
  opacity: 0; pointer-events: none;
  transition: opacity 0.7s ease;
}
#overlay.show { opacity: 1; }

/* ── Welcome screen ── */
#welcome {
  position: fixed; inset: 0; z-index: 98;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.8s ease;
  background: var(--dark);
}
#welcome.show { opacity: 1; pointer-events: all; }
#welcome.fadeout { opacity: 0; }

.wc-line {
  font-size: 11px;
  letter-spacing: 6px;
  color: rgba(0,200,255,0.5);
  text-transform: uppercase;
  font-family: 'Share Tech Mono', monospace;
  animation: none;
}
.wc-main {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(24px, 5vw, 46px);
  letter-spacing: 4px;
  text-align: center;
  line-height: 1.2;
  color: #fff;
}
.wc-main span {
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,200,255,0.6), 0 0 50px rgba(0,200,255,0.2);
}
.wc-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
}

/* Animated underline */
.wc-bar {
  width: 0px;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  box-shadow: 0 0 12px rgba(0,200,255,0.5);
  transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
  border-radius: 2px;
}
#welcome.show .wc-bar { width: 220px; }



</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="vig"></div>
<div id="overlay"></div>

<!-- Welcome screen -->
<div id="welcome">
  <div class="wc-line">// initializing complete</div>
  <div class="wc-main">Welcome to<br><span>My Portfolio</span></div>
  <div class="wc-bar"></div>
  <div class="wc-sub">entering workspace...</div>
</div>

<div class="wrap">

  <div class="top-label">MY PORTFOLIO</div>

  <!-- Circle spinner -->
  <div class="circle-wrap">
    <div class="glow-ring"></div>
    <div class="dash-ring"></div>

    <!-- SVG progress arc -->
    <svg id="progressRing" viewBox="0 0 200 200">
      <!-- Track -->
      <circle cx="100" cy="100" r="88"
        fill="none" stroke="rgba(0,200,255,0.07)" stroke-width="4"/>
      <!-- Progress arc -->
      <circle id="arcFill" cx="100" cy="100" r="88"
        fill="none" stroke="url(#arcGrad)" stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="553" stroke-dashoffset="553"
        style="transition: stroke-dashoffset 0.4s ease;"/>
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#1a8cff"/>
          <stop offset="100%" stop-color="#00c8ff"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="arc1"></div>
    <div class="arc2"></div>
    <div class="arc3"></div>

    <div class="center-info">
      <div class="center-pct" id="centerPct">0%</div>
      <div class="center-sub">loading</div>
    </div>
  </div>

  <div class="title">MY <span>PORTFOLIO</span></div>

  <!-- Progress bar -->
  <div class="prog-section">
    <div class="prog-row">
      <span class="prog-lbl">Progress</span>
      <span class="prog-num" id="progNum">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="status-row">
      <div class="s-dot"></div>
      <span class="s-txt" id="sTxt">booting system...</span>
    </div>
  </div>

</div>

<script>
/* ══════════════════════
   ANIMATED BG CANVAS
   - floating orbs
   - particle network
   - wave ripples
══════════════════════ */
const cvs = document.getElementById('bgCanvas');
const ctx = cvs.getContext('2d');
let W, H;

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* Particles */
const particles = [];
for (let i = 0; i < 90; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    r: Math.random() * 1.8 + 0.3,
    a: Math.random() * 0.4 + 0.1,
  });
}

/* Floating orbs */
const orbs = [
  { x: 0.15, y: 0.25, r: 180, a: 0.06, spd: 0.00008, phase: 0 },
  { x: 0.82, y: 0.65, r: 220, a: 0.05, spd: 0.00006, phase: 1.5 },
  { x: 0.5,  y: 0.8,  r: 150, a: 0.04, spd: 0.0001,  phase: 3 },
];

/* Ripples */
const ripples = [];
function spawnRipple() {
  ripples.push({
    x: 0.2 + Math.random() * 0.6,
    y: 0.2 + Math.random() * 0.6,
    r: 0, maxR: 80 + Math.random() * 120,
    a: 0.18, spd: 0.6
  });
}
spawnRipple();
setInterval(spawnRipple, 2200);

let t = 0;
function draw() {
  t++;
  ctx.clearRect(0, 0, W, H);

  /* Orbs */
  orbs.forEach(o => {
    const ox = o.x * W + Math.sin(t * o.spd + o.phase) * 60;
    const oy = o.y * H + Math.cos(t * o.spd * 0.7 + o.phase) * 40;
    const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, o.r);
    grad.addColorStop(0, `rgba(0,200,255,${o.a})`);
    grad.addColorStop(0.5, `rgba(26,140,255,${o.a * 0.4})`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(ox, oy, o.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  /* Ripples */
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.spd;
    rp.a -= 0.0018;
    if (rp.a <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(rp.x * W, rp.y * H, rp.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,200,255,${rp.a})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  /* Particles */
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,200,255,${p.a})`;
    ctx.fill();
  });

  /* Connecting lines */
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < 130) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,200,255,${0.07 * (1 - d / 130)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}
draw();

/* ══════════════════════
   PROGRESS RING
══════════════════════ */
const CIRC = 2 * Math.PI * 88; // ≈ 552.9
const arcFill = document.getElementById('arcFill');
arcFill.setAttribute('stroke-dasharray', CIRC);
arcFill.setAttribute('stroke-dashoffset', CIRC);

function setProgress(p) {
  const offset = CIRC * (1 - p / 100);
  arcFill.style.strokeDashoffset = offset;
  document.getElementById('centerPct').textContent = p + '%';
  document.getElementById('progNum').textContent   = p + '%';
  document.getElementById('barFill').style.width   = p + '%';
}

/* ══════════════════════
   LOADING STEPS
══════════════════════ */
const steps = [
  { p: 4,   msg: 'initializing core...' },
  { p: 10,  msg: 'loading config...' },
  { p: 19,  msg: 'importing stylesheets...' },
  { p: 29,  msg: 'loading assets...' },
  { p: 39,  msg: 'compiling components...' },
  { p: 49,  msg: 'fetching project data...' },
  { p: 58,  msg: 'building skill matrix...' },
  { p: 67,  msg: 'rendering interface...' },
  { p: 75,  msg: 'binding event handlers...' },
  { p: 83,  msg: 'optimizing animations...' },
  { p: 91,  msg: 'running integrity check...' },
  { p: 96,  msg: 'almost ready...' },
  { p: 100, msg: 'launch ready ✓' },
];

const delays = [400, 500, 550, 600, 700, 750, 650, 700, 600, 750, 700, 600, 700];
let si = 0;

function run() {
  if (si >= steps.length) return;
  const s = steps[si];
  setProgress(s.p);
  document.getElementById('sTxt').textContent = s.msg;
  si++;
  if (si < steps.length) {
    setTimeout(run, delays[si] + Math.random() * 200);
  } else {
    // Fade out loader UI
    setTimeout(() => {
      document.querySelector('.wrap').style.transition = 'opacity 0.6s ease';
      document.querySelector('.wrap').style.opacity = '0';

      // Hide loader wrap completely then show welcome
      setTimeout(() => {
        document.querySelector('.wrap').style.display = 'none';
        const wc = document.getElementById('welcome');
        wc.classList.add('show');

        // Fade out welcome then redirect
        setTimeout(() => {
          wc.style.transition = 'opacity 1.1s ease';
          wc.classList.add('fadeout');
          document.getElementById('overlay').classList.add('show');
          setTimeout(() => { window.location.href = 'Portfolio.html'; }, 1200);
        }, 2400);
      }, 700);
    }, 500);
  }
}

setTimeout(run, 700);
</script>
</body>
</html>
